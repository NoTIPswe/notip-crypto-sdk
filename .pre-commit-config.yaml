repos:
    - repo: local
      hooks:
          - id: check
            name: Check Linting, Formatting and Type Checking
            entry: npm run check
            language: system
            types: [file]
            always_run: true

    - repo: https://github.com/gitleaks/gitleaks
      rev: v8.30.1
      hooks:
          - id: gitleaks
