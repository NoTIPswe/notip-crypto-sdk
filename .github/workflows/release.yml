name: Release

on:
    workflow_dispatch:
    push:
        branches:
            - main

concurrency:
    group: release-${{ github.repository }}
    cancel-in-progress: false

permissions:
    contents: write
    issues: write
    pull-requests: write
    packages: write

jobs:
    quality-checks:
        name: Quality Checks
        uses: ./.github/workflows/quality-checks.yml
        secrets: inherit

    release:
        name: Semantic Release
        needs: quality-checks
        runs-on: ubuntu-latest
        container:
            image: ghcr.io/notipswe/notip-ts-dev:v0.0.1

        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  persist-credentials: true
                  token: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}

            - name: Configure git safe directory
              run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

            - name: Validate semantic-release token
              env:
                  SEMANTIC_RELEASE_TOKEN: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}
              run: |
                  if [ -z "$SEMANTIC_RELEASE_TOKEN" ]; then
                    echo "SEMANTIC_RELEASE_TOKEN is required for semantic-release push on protected main"
                    exit 1
                  fi

            - name: Cache npm cache
              uses: actions/cache@v5
              with:
                  path: ~/.npm
                  key: npm-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
                  restore-keys: |
                      npm-cache-${{ runner.os }}-

            - name: Install dependencies
              run: npm ci

            - name: Run Semantic Release
              id: semantic
              env:
                  GH_TOKEN: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}
                  GITHUB_TOKEN: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}
                  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
                  GIT_AUTHOR_NAME: github-actions[bot]
                  GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
                  GIT_COMMITTER_NAME: github-actions[bot]
                  GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
              run: npx semantic-release
