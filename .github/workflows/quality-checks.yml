name: Quality Checks

on:
    workflow_call:

permissions:
    pull-requests: write
    contents: read

jobs:
    lint:
        name: Lint, Format & Typecheck
        runs-on: ubuntu-latest
        container:
            image: ghcr.io/notipswe/notip-ts-dev:v0.0.1

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Configure git safe directory
              run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

            - name: Cache npm cache
              uses: actions/cache@v5
              with:
                  path: ~/.npm
                  key: npm-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
                  restore-keys: |
                      npm-cache-${{ runner.os }}-

            - name: Install dependencies
              run: npm ci

            - name: Run checks
              run: npm run check

    test:
        name: Tests & Coverage
        needs: [lint]
        runs-on: ubuntu-latest
        container:
            image: ghcr.io/notipswe/notip-ts-dev:v0.0.1

        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Configure git safe directory
              run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

            - name: Cache npm cache
              uses: actions/cache@v5
              with:
                  path: ~/.npm
                  key: npm-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
                  restore-keys: |
                      npm-cache-${{ runner.os }}-

            - name: Install dependencies
              run: npm ci

            - name: Run tests with coverage and SonarCloud scan
              run: npm run sonar
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
